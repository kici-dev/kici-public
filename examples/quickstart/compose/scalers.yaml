# KiCI quickstart — container scaler configuration.
#
# Generated by packages/ci/src/generate-quickstart-compose.ts on every
# release. Don't hand-edit — your changes will be overwritten the next
# time `pnpm release` or `pnpm release:prod` runs. To change the
# template, edit the generator's buildQuickstartScalers() function.
#
# What this does: the orchestrator reads this file at startup (because
# docker-compose.yaml sets KICI_SCALER_CONFIG_PATH=/etc/kici/scalers.yaml
# and bind-mounts the file there). When a job arrives with
# `runsOn: ['linux', 'container']`, the orchestrator spawns a one-shot
# agent container via the bind-mounted container runtime socket, the
# agent runs the job, then the container is destroyed.
#
# Networking: spawned agents reach the orchestrator at
# `ws://host.docker.internal:4000/ws`. Docker Desktop and Podman 4+
# provide that alias out of the box; on plain Linux Docker engine the
# `extraHosts` line below adds the same alias via host-gateway.

version: 1
globalMaxAgents: 4

scalers:
  - name: container-default
    type: container
    runtime: auto
    # The container runtime socket from the host is bind-mounted at this
    # path by docker-compose.yaml. Setting socketPath explicitly tells the
    # orchestrator's startup tool-validation gate not to look for a
    # `docker`/`podman` binary on PATH inside the (distroless) orchestrator
    # image — the runtime is reached via the bind-mounted socket. On
    # rootless Podman the host swaps the bind-mount to
    # `$XDG_RUNTIME_DIR/podman/podman.sock` but the in-container path stays
    # `/var/run/docker.sock`, so this line works in both setups.
    socketPath: /var/run/docker.sock
    maxAgents: 4
    orchestratorUrl: ws://host.docker.internal:4000/ws
    extraHosts:
      - 'host.docker.internal:host-gateway'
    labelSets:
      - labels: [linux, container]
        image: quay.io/kici-dev/kici-agent:0.1.24@sha256:1e02f0cda7f398d72b2e95dd74f9c67fb5a8b041307886ef85a6eae3024c7a4e
