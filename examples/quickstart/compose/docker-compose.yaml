# KiCI customer-orchestrator stack — minimal compose template.
#
# Generated by packages/ci/src/generate-quickstart-compose.ts on every
# release. Don't hand-edit — your changes will be overwritten the next
# time `pnpm release` or `pnpm release:prod` runs. To change the
# template, edit the generator's buildQuickstartCompose() function.
#
# What this runs:
#   - postgres:     persistence for runs, sources, secrets, queue
#   - seaweedfs:    self-contained S3-compatible object store backing the
#                   cache. Required for `kici run remote` (uploads your
#                   working-tree overlay; the agent fetches it back).
#   - orchestrator: trigger evaluation, job dispatch, talks to api.kici.dev.
#                   Spawns one agent container per job via the container
#                   scaler defined in scalers.yaml (mounted at
#                   /etc/kici/scalers.yaml). Requires access to the host's
#                   container runtime socket — see the volumes block below.
#
# How webhooks reach the orchestrator: the public KiCI Platform at
# api.kici.dev receives GitHub webhooks at
# https://api.kici.dev/webhook/<orgId>/... and relays them over the
# orchestrator's outbound WebSocket. No inbound port needs to be open
# on the box running this stack.
#
# Required env vars (see .env.example): KICI_PLATFORM_TOKEN, KICI_SECRET_KEY,
# KICI_BOOTSTRAP_ADMIN_TOKEN. POSTGRES_PASSWORD is optional (defaults to the
# local-only stub kici-local).
#
# Sibling file: scalers.yaml — declares the container scaler that
# spawns agents on demand. Same trust boundary as any CI runner that
# uses a Docker-in-Docker pattern: the orchestrator container can
# manage other containers on this host.

services:
  postgres:
    image: postgres:18.4-trixie
    environment:
      POSTGRES_DB: kici
      POSTGRES_USER: kici
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-kici-local}'
    # Postgres 18+ images expect the bind to land at /var/lib/postgresql
    # (not /var/lib/postgresql/data). The image stores data in a
    # major-version subdirectory (.../<major>/), which lets pg_upgrade
    # --link work across a major bump without mount-point gymnastics.
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kici -d kici']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  seaweedfs:
    image: chrislusf/seaweedfs:4.34
    # Self-contained S3-compatible store for the cache (compiled bundles,
    # dependency tarballs, and `kici run remote` overlay uploads). A single
    # static identity is defined in seaweedfs-s3.json; the kici-cache bucket is
    # created on first write. Local-development only — not for production.
    command: 'server -s3 -dir=/data -s3.config=/etc/seaweedfs/s3.json'
    volumes:
      - ./seaweedfs-s3.json:/etc/seaweedfs/s3.json:ro
      - seaweedfs-data:/data
    ports:
      # Published so the host CLI (KICI_STORAGE_UPLOAD_ENDPOINT=localhost:8333)
      # and spawned agent containers (via host.docker.internal) can reach it.
      - '8333:8333'
    healthcheck:
      # The S3 root path requires auth (403); /status is the unauthenticated
      # liveness endpoint (200). Use 127.0.0.1 (not localhost): SeaweedFS binds
      # IPv4 only, and the image's BusyBox wget resolves localhost to IPv6 ::1
      # first, which would always refuse.
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:8333/status >/dev/null 2>&1 || exit 1']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  orchestrator:
    image: quay.io/kici-dev/kici-orchestrator:0.1.23@sha256:240790924ee73e4b1230deb989d3db6c05141ca4db6376baeb88f5e0aeed19ee
    # The orchestrator image runs as the unprivileged `node` user, but the
    # container scaler needs read/write access to the bind-mounted container
    # runtime socket below. On a standard Docker host that socket is
    # root:docker; on rootless Podman it appears root-owned inside the
    # container (userns remap). Either way the `node` user cannot access it,
    # and the orchestrator exits at boot with "No container runtime found".
    # Running the service as root (uid 0) gives it socket access — on rootless
    # Podman uid 0 maps to the host user that owns the socket.
    user: '0:0'
    # The orchestrator's default container scaler enforces per-agent network
    # isolation via nftables, which requires the NET_ADMIN Linux capability.
    # Without it the orchestrator exits at boot with "nftables operation
    # denied -- missing NET_ADMIN capability". Customers who prefer not to
    # grant NET_ADMIN can instead set `networkIsolation: false` on each
    # container scaler in scalers.yaml — at the cost of letting spawned
    # agents talk to each other on the bridge network.
    cap_add:
      - NET_ADMIN
    environment:
      KICI_MODE: platform
      KICI_PORT: '4000'
      KICI_PLATFORM_URL: wss://api.kici.dev/ws
      KICI_PLATFORM_TOKEN: '${KICI_PLATFORM_TOKEN}'
      KICI_DATABASE_URL: 'postgres://kici:${POSTGRES_PASSWORD:-kici-local}@postgres:5432/kici'
      KICI_SECRET_KEY: '${KICI_SECRET_KEY}'
      KICI_BOOTSTRAP_ADMIN_TOKEN: '${KICI_BOOTSTRAP_ADMIN_TOKEN}'
      KICI_SCALER_CONFIG_PATH: /etc/kici/scalers.yaml
      KICI_LOG_LEVEL: info
      # Cache storage — SeaweedFS S3. Three endpoints for three vantage points:
      #   ENDPOINT          — orchestrator (this container) → compose DNS name.
      #   UPLOAD_ENDPOINT   — host CLI running `kici run remote` → localhost.
      #   EXTERNAL_ENDPOINT — spawned agent containers → host.docker.internal.
      KICI_STORAGE_TYPE: s3
      KICI_STORAGE_BUCKET: kici-cache
      KICI_STORAGE_ENDPOINT: http://seaweedfs:8333
      KICI_STORAGE_UPLOAD_ENDPOINT: http://localhost:8333
      KICI_STORAGE_EXTERNAL_ENDPOINT: http://host.docker.internal:8333
      KICI_STORAGE_FORCE_PATH_STYLE: 'true'
      # The AWS SDK requires a region even for non-AWS endpoints; SeaweedFS
      # ignores the value, so any placeholder works.
      KICI_STORAGE_REGION: us-east-1
      AWS_ACCESS_KEY_ID: kici-local
      AWS_SECRET_ACCESS_KEY: kici-local-secret
    ports:
      - '4000:4000'
    volumes:
      # Container runtime socket. Default is the Docker socket path; on
      # rootless Podman swap to $XDG_RUNTIME_DIR/podman/podman.sock
      # (typically /run/user/<uid>/podman/podman.sock).
      - /var/run/docker.sock:/var/run/docker.sock
      # Scaler config — sibling scalers.yaml mounted read-only.
      - ./scalers.yaml:/etc/kici/scalers.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  seaweedfs-data:
